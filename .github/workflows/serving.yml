name: Model Serving CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Train + Test API
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model and save artifacts
        run: python src/model/train.py

      - name: Run API tests
        run: pytest tests/ -v --cov=src --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/
          retention-days: 30

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Train model for Docker build
        run: |
          pip install -r requirements.txt
          python src/model/train.py

      - name: Build Docker image
        run: docker build -t mlops-model-serving:latest .

      - name: Test Docker container
        run: |
          docker run -d -p 8000:8000 --name test-api mlops-model-serving:latest
          sleep 10
          curl -f http://localhost:8000/health
          docker stop test-api
